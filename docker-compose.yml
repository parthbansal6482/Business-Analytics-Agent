# ─────────────────────────────────────────────────────────
# E-Commerce Intelligence Research Agent — Docker Compose
# ─────────────────────────────────────────────────────────
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up --build
#   3. Open http://localhost:5173 in your browser
# ─────────────────────────────────────────────────────────

services:

  # ── Infrastructure ────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ecomm_agent}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ecomm_agent}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:6333/healthz > /dev/null 2>&1 || curl -sf http://localhost:6333/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
  # healthcheck removed
  # ── Application ───────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override URLs to use Docker service names instead of localhost
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-ecomm_agent}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  qdrantdata:
