name: Deploy to Server

on:
  push:
    branches:
      - main  # Trigger only on push to main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Navigate to the project directory
            # CHANGE THIS to your actual folder path on the server!
            cd ~/Business-Analytics-Agent 

            # 2. Pull the latest code
            git pull origin main

            # 3. Rebuild and restart containers
            # We use --build to ensure code changes are baked into images
            docker compose up --build -d

            # 4. Cleanup old Docker data to save disk space
            docker image prune -f
